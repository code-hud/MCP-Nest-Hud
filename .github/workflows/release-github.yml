name: Release to GitHub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3 or 1.2.3-alpha.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-github:
    name: Publish tarball to GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (release event uses release tag)
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Checkout (workflow_dispatch uses default ref)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test src tests

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_VERSION="${{ github.event.release.tag_name }}"
          else
            TAG_VERSION="${{ github.event.inputs.version }}"
          fi
          TAG_VERSION="${TAG_VERSION#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Pack tarball
        id: pack
        run: |
          # `npm pack` runs the `prepare` lifecycle script (which builds), and
          # by default prints script log lines to stdout *before* the tarball
          # filename. Capturing all of that into $GITHUB_OUTPUT triggers
          # "Invalid format" errors. `--silent` suppresses the npm logs so
          # only the final tarball filename is emitted.
          TARBALL=$(npm pack --silent)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ steps.pack.outputs.path }}" --clobber
