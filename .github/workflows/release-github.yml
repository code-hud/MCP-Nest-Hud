name: Release to GitHub

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-github:
    name: Publish tarball to GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (release event uses release tag)
        if: github.event_name == 'release'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Checkout (workflow_dispatch uses default ref)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun test src tests

      - name: Resolve version
        id: version
        run: |
          # The version always comes from the checked-out package.json. For
          # a release event we additionally assert that the release tag
          # matches what's in the file, so we never silently ship a tarball
          # whose internal version disagrees with the GitHub Release tag.
          PKG_VERSION=$(node -p "require('./package.json').version")

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            TAG_VERSION="${TAG#v}"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Release tag '$TAG' (parsed as '$TAG_VERSION') does not match package.json version '$PKG_VERSION'. Bump package.json before tagging."
              exit 1
            fi
          fi

          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack tarball
        id: pack
        run: |
          # `npm pack` runs the `prepare` lifecycle script (which builds), and
          # by default prints script log lines to stdout *before* the tarball
          # filename. Capturing all of that into $GITHUB_OUTPUT triggers
          # "Invalid format" errors. `--silent` suppresses the npm logs so
          # only the final tarball filename is emitted.
          TARBALL=$(npm pack --silent)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "path=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ steps.pack.outputs.path }}" --clobber
